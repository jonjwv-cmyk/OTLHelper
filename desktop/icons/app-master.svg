<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#08080A"/>
    </radialGradient>

    <linearGradient id="pin" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFB257"/>
      <stop offset="40%" stop-color="#FF8B2E"/>
      <stop offset="80%" stop-color="#EF6312"/>
      <stop offset="100%" stop-color="#C24205"/>
    </linearGradient>

    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD66B"/>
      <stop offset="100%" stop-color="#F2A93D"/>
    </linearGradient>

    <radialGradient id="hl" cx="38%" cy="22%" r="38%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.50"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="groundShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="60%" stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- =========================================================
       КОМПОЗИЦИЯ STRICTLY SQUARE 600×600.
       Track diameter = pin total height = 600.
       Bounding box: x=212-812 (width 600), y=210-810 (height 600).

       LAYER 1: Track 300° arc, gap right.
       Radius 300, center (512, 510).
       ========================================================= -->
  <path d="M 772 360
           A 300 300 0 1 0 772 660"
        fill="none"
        stroke="url(#track)"
        stroke-width="30"
        stroke-linecap="round"/>

  <!-- =========================================================
       LAYER 2: ARROWHEAD slim SF triangle.
       Tangent CCW unit (0.5, -0.867) at 4 o'clock.
       ========================================================= -->
  <path d="M 822 573
           L 746 645
           L 798 675
           Z"
        fill="url(#track)"/>

  <!-- =========================================================
       LAYER 3: PIN — Apple Maps tangent geometry.
       Head r=140 центр (512, 350). Spans y=210-490.
       Tip (512, 810). Tail 320.
       Pin total height = 600 = track diameter (SQUARE composition).
       Pin head top y=210 = track top y=210.
       Pin tip y=810 = track bottom y=810.

       Tangent: d=460, b=140²/460=42.6, y=392.6.
       a=sqrt(140²-42.6²)=133.4.
       Right tangent: (645.4, 392.6). Left: (378.6, 392.6).
       ========================================================= -->
  <path d="M 645.4 392.6
           L 512 810
           L 378.6 392.6
           A 140 140 0 1 1 645.4 392.6
           Z"
        fill="url(#pin)"/>

  <!-- =========================================================
       LAYER 4: ЧЁРНАЯ ТОЧКА в центре head, r=42.
       ========================================================= -->
  <circle cx="512" cy="350" r="42" fill="#0A0A0C"/>

  <!-- =========================================================
       LAYER 5: HIGHLIGHT (Liquid Glass).
       ========================================================= -->
  <ellipse cx="466" cy="306" rx="72" ry="44" fill="url(#hl)"/>

  <!-- =========================================================
       LAYER 6: WEAVE OVERLAY — lower arc segment поверх pin tail.
       От 7 o'clock (362, 770) через 6 (512, 810) к 5 (662, 770).
       ========================================================= -->
  <path d="M 362 770
           A 300 300 0 0 0 662 770"
        fill="none"
        stroke="url(#track)"
        stroke-width="30"
        stroke-linecap="round"/>
</svg>
